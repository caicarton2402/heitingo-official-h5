<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="海汀阁">
    <link rel="apple-touch-icon" href="https://sc02.alicdn.com/kf/Ac377697ec23a42df987d7246de3a6a5d8.png">
    <link rel="manifest" href="manifest.json">
    <title>海汀阁 | HEITINGO</title>
    <style>
        :root {
            --bg: #000;
            --card-bg: #121212;
            --text: #fff;
            --dim: rgba(255,255,255,0.6);
            --accent: #ff2d55; /* Neon Pink */
            --gradient: linear-gradient(90deg, #ff2d55 0%, #000 100%);
            --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .logo-main {
            font-size: 28px; font-weight: 300; letter-spacing: 4px;
            display: flex; align-items: center; gap: 15px;
        }
        .logo-main .line { width: 1px; height: 24px; background: rgba(255,255,255,0.4); }

        /* Navigation Bar - Strictly following Image */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            color: #888; font-size: 11px; gap: 6px; transition: 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-size: 22px; }
        .play-icon-box {
            width: 44px; height: 44px; border-radius: 12px;
            border: 2px solid var(--accent); display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.3);
        }

        /* Top Tab Bar - Strictly following Image */
        .top-nav {
            position: sticky; top: 0; width: 100%; height: 100px;
            background: #000; z-index: 900;
            padding: 50px 15px 10px; display: flex; align-items: center;
            justify-content: space-between;
        }
        .top-tabs { display: flex; gap: 20px; font-size: 15px; color: #888; }
        .top-tabs span.active { color: #fff; position: relative; }
        .top-tabs span.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); width: 12px; height: 2px;
            background: var(--accent); border-radius: 2px;
        }
        .icon-btn { font-size: 20px; color: #fff; }

        /* Content Area */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto; display: none; padding-bottom: 90px;
        }
        .screen.active { display: block; }

        /* Play Feed - Strictly following Image */
        .feed-container { width: 100%; }
        .user-card { margin-bottom: 2px; background: #000; }
        
        .user-header {
            height: 36px; padding: 0 15px;
            background: var(--gradient);
            display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; font-weight: 500;
        }
        .user-meta { display: flex; gap: 12px; align-items: center; opacity: 0.9; }
        .meta-dot { width: 14px; height: 14px; background: #fff; border-radius: 50%; }

        .user-image {
            width: 100%; aspect-ratio: 16/9; overflow: hidden;
            background: #111; position: relative;
        }
        .user-image img { width: 100%; height: 100%; object-fit: cover; }

        .user-stats {
            height: 44px; padding: 0 15px; background: #000;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #111;
        }
        .stats-left { display: flex; gap: 15px; font-size: 12px; color: #fff; opacity: 0.8; }
        .stats-item { display: flex; align-items: center; gap: 5px; }
        .stats-icon { font-size: 16px; }
        .hearts { color: var(--accent); font-size: 14px; display: flex; gap: 2px; }

        /* Placeholder Screens */
        .placeholder-screen { padding: 150px 20px; text-align: center; color: var(--dim); }

    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash" onclick="enterApp()">
        <div class="logo-main">
            <span>海汀阁</span>
            <div class="line"></div>
            <span>HEITINGO</span>
        </div>
        <p style="margin-top: 100px; font-size: 12px; opacity: 0.5; letter-spacing: 2px;">CLICK TO START</p>
    </div>

    <!-- Main App Container -->
    <div id="app" style="display:none;">
        
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="icon-btn">☰</div>
            <div class="top-tabs">
                <span class="active">全部</span>
                <span>游客</span>
                <span>会员</span>
                <span>VIP</span>
                <span>SVIP</span>
            </div>
            <div class="icon-btn">⚙️</div>
        </div>

        <!-- 1. 首页 -->
        <div id="home-screen" class="screen">
            <div class="placeholder-screen">首页正在建设中...</div>
        </div>

        <!-- 2. 商城 -->
        <div id="mall-screen" class="screen">
            <div class="placeholder-screen">数字商城正在建设中...</div>
        </div>

        <!-- 3. 玩 (Active Screen) -->
        <div id="play-screen" class="screen active">
            <div class="feed-container">
                <!-- Card 1 -->
                <div class="user-card">
                    <div class="user-header">
                        <div class="handle">@阿洛大魔王</div>
                        <div class="user-meta">
                            <span style="display:flex;align-items:center;gap:4px;"><div class="meta-dot"></div>172cm</span>
                            <span style="display:flex;align-items:center;gap:4px;"><div class="meta-dot"></div>57kg</span>
                            <span style="display:flex;align-items:center;gap:4px;"><div class="meta-dot"></div>38D</span>
                        </div>
                    </div>
                    <div class="user-image">
                        <img src="https://sc02.alicdn.com/kf/Af414af792b324770a59a467535342156x.png" alt="Avatar 1">
                    </div>
                    <div class="user-stats">
                        <div class="stats-left">
                            <div class="stats-item"><span class="stats-icon">🎵</span> 107.5万</div>
                            <div class="stats-item"><span class="stats-icon">📺</span> 46万</div>
                            <div class="stats-item"><span class="stats-icon">👁️</span> 98万</div>
                        </div>
                        <div class="hearts">❤️❤️❤️❤️❤️</div>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="user-card">
                    <div class="user-header">
                        <div class="handle">@阿洛大魔王</div>
                        <div class="user-meta">
                             <span style="display:flex;align-items:center;gap:4px;"><div class="meta-dot"></div>172cm</span>
                            <span style="display:flex;align-items:center;gap:4px;"><div class="meta-dot"></div>57kg</span>
                            <span style="display:flex;align-items:center;gap:4px;"><div class="meta-dot"></div>38D</span>
                        </div>
                    </div>
                    <div class="user-image">
                        <img src="https://sc02.alicdn.com/kf/Af414af792b324770a59a467535342156x.png" alt="Avatar 2">
                    </div>
                    <div class="user-stats">
                        <div class="stats-left">
                            <div class="stats-item"><span class="stats-icon">🎵</span> 107.5万</div>
                            <div class="stats-item"><span class="stats-icon">📺</span> 46万</div>
                            <div class="stats-item"><span class="stats-icon">👁️</span> 98万</div>
                        </div>
                        <div class="hearts">❤️❤️❤️❤️❤️</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 4. 信息 -->
        <div id="info-screen" class="screen">
            <div class="placeholder-screen">消息中心正在建设中...</div>
        </div>

        <!-- 5. 我 -->
        <div id="profile-screen" class="screen">
            <div class="placeholder-screen">个人中心正在建设中...</div>
        </div>

        <!-- Bottom Navigation -->
        <nav id="nav-bar">
            <div class="nav-item" onclick="navTo('home')">
                <div class="nav-icon">🏠</div>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="navTo('mall')">
                <div class="nav-icon">🔒</div>
                <span>商城</span>
            </div>
            <div class="nav-item active" onclick="navTo('play')">
                <div class="nav-icon">
                    <div class="play-icon-box">∇</div>
                </div>
                <span style="margin-top:2px;">玩</span>
            </div>
            <div class="nav-item" onclick="navTo('info')">
                <div class="nav-icon">💬</div>
                <span>信息</span>
            </div>
            <div class="nav-item" onclick="navTo('profile')">
                <div class="nav-icon">👤</div>
                <span>我</span>
            </div>
        </nav>
    </div>

    <script>
        function enterApp() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }

        function navTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id + '-screen').classList.add('active');
            
            // Toggle Top Nav Visibility
            document.querySelector('.top-nav').style.display = (id === 'play' ? 'flex' : 'none');

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(
                    id==='home'?'首页':(id==='mall'?'商城':(id==='play'?'玩':(id==='info'?'信息':'我')))
                )) {
                    item.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
