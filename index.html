<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="海汀阁">
    <link rel="apple-touch-icon" href="https://sc02.alicdn.com/kf/Ac377697ec23a42df987d7246de3a6a5d8.png">
    <link rel="manifest" href="manifest.json">
    <title>海汀阁 | HEITINGO</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --dim: rgba(255,255,255,0.6);
            --accent: #ff2d55;
            --border: rgba(255,255,255,0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .logo-main {
            font-size: 28px; font-weight: 300; letter-spacing: 4px;
            display: flex; align-items: center; gap: 15px;
        }
        .logo-main .line { width: 1px; height: 24px; background: rgba(255,255,255,0.4); }

        /* Navigation Bar */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            color: #888; font-size: 11px; gap: 6px; transition: 0.2s;
        }
        .nav-item.active { color: #fff; }
        .nav-icon { width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; font-size: 22px; }
        .play-icon-box {
            width: 44px; height: 44px; border-radius: 12px;
            border: 2px solid var(--accent); display: flex;
            justify-content: center; align-items: center;
            box-shadow: 0 0 15px rgba(255, 45, 85, 0.3);
            color: var(--accent);
        }

        /* Top Tab Bar - Persistent on Play Screen */
        .top-nav {
            position: absolute; top: 0; width: 100%; height: 100px;
            z-index: 900;
            padding: 50px 15px 10px; display: flex; align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
        }
        .top-tabs { display: flex; gap: 20px; font-size: 15px; color: #ccc; }
        .top-tabs span.active { color: #fff; position: relative; }
        .top-tabs span.active::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); width: 12px; height: 2px;
            background: #fff; border-radius: 2px;
        }
        .icon-btn { font-size: 20px; color: #fff; }

        /* Content Area */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; display: none;
        }
        .screen.active { display: block; }

        /* 3D Dressing Screen - Strictly following New Image */
        #play-screen {
            background-image: url('https://sc02.alicdn.com/kf/Afb9c88bddfa941468baa06c0f03a5b37c.png');
            background-size: cover;
            background-position: center;
        }

        /* Right Sidebar Buttons */
        .sidebar-right {
            position: absolute; right: 20px; top: 150px;
            display: flex; flex-direction: column; gap: 15px;
            z-index: 910;
        }
        .side-btn {
            width: 54px; height: 54px; border-radius: 50%;
            background: rgba(40, 50, 80, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 14px; backdrop-filter: blur(5px);
        }

        /* Left Bottom Tags */
        .tags-left {
            position: absolute; left: 20px; bottom: 120px;
            display: flex; flex-direction: column; gap: 15px;
            z-index: 910;
        }
        .tag-bubble {
            padding: 8px 18px; border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff; font-size: 14px; width: fit-content;
            backdrop-filter: blur(5px);
        }

        /* Bottom Left Card */
        .floating-card {
            position: absolute; left: 20px; bottom: 180px;
            width: 140px; background: rgba(0,0,0,0.6);
            border-radius: 8px; padding: 10px;
            border-left: 4px solid #fff;
            z-index: 910; backdrop-filter: blur(5px);
        }
        .card-tag { font-size: 10px; color: var(--accent); margin-bottom: 4px; }
        .card-title { font-size: 16px; font-weight: bold; }

        /* Bottom Right Confirm */
        .confirm-btn {
            position: absolute; right: 25px; bottom: 120px;
            width: 90px; height: 90px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 24px; font-weight: 300;
            z-index: 910;
        }

        /* Audio Icon */
        .audio-btn {
            position: absolute; right: 25px; bottom: 250px;
            font-size: 20px; opacity: 0.8; z-index: 910;
        }

        .dots-indicator {
            position: absolute; bottom: 105px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 910;
        }
        .dot { width: 24px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .dot.active { background: #fff; }

    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash" onclick="enterApp()">
        <div class="logo-main">
            <span>海汀阁</span>
            <div class="line"></div>
            <span>HEITINGO</span>
        </div>
        <p style="margin-top: 100px; font-size: 12px; opacity: 0.5; letter-spacing: 2px;">CLICK TO START</p>
    </div>

    <!-- Play Screen (Active) - Strictly following New Reference -->
    <div id="play-screen" class="screen active">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="icon-btn">☰</div>
            <div class="top-tabs">
                <span class="active">全部</span>
                <span>游客</span>
                <span>会员</span>
                <span>VIP</span>
                <span>SVIP</span>
            </div>
            <div class="icon-btn">⚙️</div>
        </div>

        <!-- Sidebar Right -->
        <div class="sidebar-right">
            <div class="side-btn">内装</div>
            <div class="side-btn">上装</div>
            <div class="side-btn">下装</div>
            <div class="side-btn">袜子</div>
            <div class="side-btn">鞋子</div>
        </div>

        <div class="audio-btn">🔊</div>

        <!-- Left Bottom Info -->
        <div class="tags-left">
            <div class="tag-bubble">爬山</div>
            <div class="tag-bubble">逛街</div>
        </div>

        <div class="floating-card">
            <div class="card-tag">菲梦 — 韵</div>
            <div class="card-title">KTV 套装</div>
        </div>

        <div class="dots-indicator">
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>

        <!-- Confirm Button -->
        <div class="confirm-btn">确认</div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="nav-bar" style="display: flex;">
        <div class="nav-item">
            <div class="nav-icon">🏠</div>
            <span>首页</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">🔒</div>
            <span>商城</span>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">
                <div class="play-icon-box">∇</div>
            </div>
            <span style="margin-top:2px;">玩</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">💬</div>
            <span>信息</span>
        </div>
        <div class="nav-item">
            <div class="nav-icon">👤</div>
            <span>我</span>
        </div>
    </nav>

    <script>
        function enterApp() {
            document.getElementById('splash').style.display = 'none';
        }
    </script>
</body>
</html>
